# =============================================================
# SmartJuraJ9 — Jura J9.3 Coffee Machine via ESP32-C6
# =============================================================
# Liest Zähler & Status, sendet Brüh-/Spül-Befehle
# UART 9600 Baud über Level Converter (3.3V ↔ 5V)
# =============================================================

substitutions:
  devicename: smart-jura-j9
  friendly_name: "Jura J9.3"

esphome:
  name: ${devicename}
  friendly_name: "${friendly_name}"

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

# --- Lokale Komponente ---
external_components:
  - source:
      type: local
      path: components

# --- WLAN ---
wifi:
  ssid: "MKWLAN"
  password: !secret wifi_password

  ap:
    ssid: "Jura-J9-Fallback"
    password: "juraj91234"

captive_portal:

# --- Home Assistant API ---
api:
  encryption:
    key: !secret jura_api_key

# --- OTA Updates ---
ota:
  - platform: esphome
    password: !secret jura_ota_password

# --- Logging ---
logger:
  level: DEBUG

# --- Status LED (onboard, GPIO8) ---
status_led:
  pin:
    number: GPIO8
    inverted: true

# =============================================================
# UART — Jura Service Port
# =============================================================
# GPIO4 (TX) → Level Converter LV1 → HV1 → Jura Pin 6 (RX)
# GPIO5 (RX) ← Level Converter LV2 ← HV2 ← Jura Pin 7 (TX)
# =============================================================
uart:
  tx_pin: GPIO4
  rx_pin: GPIO5
  baud_rate: 9600
  id: uart_jura

# =============================================================
# Jura Coffee Component — liest Zähler & Status alle 60s
# =============================================================
jura_coffee:
  uart_id: uart_jura
  update_interval: 60s

  single_espresso:
    name: "${friendly_name} Espresso"
    icon: "mdi:coffee"
  double_espresso:
    name: "${friendly_name} Doppel-Espresso"
    icon: "mdi:coffee"
  coffee:
    name: "${friendly_name} Kaffee"
    icon: "mdi:coffee"
  double_coffee:
    name: "${friendly_name} Doppel-Kaffee"
    icon: "mdi:coffee"
  ristretto:
    name: "${friendly_name} Ristretto"
    icon: "mdi:coffee"
  double_ristretto:
    name: "${friendly_name} Doppel-Ristretto"
    icon: "mdi:coffee"
  cappuccino:
    name: "${friendly_name} Cappuccino"
    icon: "mdi:coffee-outline"
  latte:
    name: "${friendly_name} Latte Macchiato"
    icon: "mdi:coffee-outline"
  milk:
    name: "${friendly_name} Milch"
    icon: "mdi:cup-water"
  hot_water:
    name: "${friendly_name} Heisswasser"
    icon: "mdi:cup-water"
  grinded_coffee:
    name: "${friendly_name} Pulverkaffee"
    icon: "mdi:coffee"
  cleanings:
    name: "${friendly_name} Reinigungen"
    icon: "mdi:broom"
  decalcifications:
    name: "${friendly_name} Entkalkungen"
    icon: "mdi:water-opacity"
  filter_changes:
    name: "${friendly_name} Filterwechsel"
    icon: "mdi:filter"
  milk_cleanings:
    name: "${friendly_name} Milchsystem-Reinigungen"
    icon: "mdi:broom"
  tray_status:
    name: "${friendly_name} Abtropfschale"
    icon: "mdi:tray-full"
  tank_status:
    name: "${friendly_name} Wassertank"
    icon: "mdi:water"

# =============================================================
# Befehle — Jura Protokoll-kodierte UART-Bytes
# =============================================================
# Kodierung: Jedes ASCII-Zeichen → 4 Bytes (Bits 2+5 tragen Daten)
# Befehle: AN:01=Ein, AN:02=Aus, FA:01=Power, FA:03=Espresso,
#          FA:04=Kaffee, FA:05=Ristretto, FA:06=Cappuccino,
#          FA:07=Latte, FA:08=Heisswasser
# =============================================================

button:
  # --- Getränke ---
  - platform: template
    name: "${friendly_name} Espresso machen"
    icon: "mdi:coffee"
    id: btn_espresso
    on_press:
      - logger.log: "Jura → Espresso"
      - uart.write:       # F
          data: [0xFB, 0xDF, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # A
          data: [0xDF, 0xDB, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # :
          data: [0xFB, 0xFB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 0
          data: [0xDB, 0xDB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 3
          data: [0xFF, 0xDB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # \r
          data: [0xDF, 0xFF, 0xDB, 0xDB]
      - delay: 8ms
      - uart.write:       # \n
          data: [0xFB, 0xFB, 0xDB, 0xDB]

  - platform: template
    name: "${friendly_name} Kaffee machen"
    icon: "mdi:coffee"
    id: btn_coffee
    on_press:
      - logger.log: "Jura → Kaffee"
      - uart.write:       # F
          data: [0xFB, 0xDF, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # A
          data: [0xDF, 0xDB, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # :
          data: [0xFB, 0xFB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 0
          data: [0xDB, 0xDB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 4
          data: [0xDB, 0xDF, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # \r
          data: [0xDF, 0xFF, 0xDB, 0xDB]
      - delay: 8ms
      - uart.write:       # \n
          data: [0xFB, 0xFB, 0xDB, 0xDB]

  - platform: template
    name: "${friendly_name} Ristretto machen"
    icon: "mdi:coffee"
    id: btn_ristretto
    on_press:
      - logger.log: "Jura → Ristretto"
      - uart.write:       # F
          data: [0xFB, 0xDF, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # A
          data: [0xDF, 0xDB, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # :
          data: [0xFB, 0xFB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 0
          data: [0xDB, 0xDB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 5
          data: [0xDF, 0xDF, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # \r
          data: [0xDF, 0xFF, 0xDB, 0xDB]
      - delay: 8ms
      - uart.write:       # \n
          data: [0xFB, 0xFB, 0xDB, 0xDB]

  - platform: template
    name: "${friendly_name} Cappuccino machen"
    icon: "mdi:coffee-outline"
    id: btn_cappuccino
    on_press:
      - logger.log: "Jura → Cappuccino"
      - uart.write:       # F
          data: [0xFB, 0xDF, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # A
          data: [0xDF, 0xDB, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # :
          data: [0xFB, 0xFB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 0
          data: [0xDB, 0xDB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 6
          data: [0xFB, 0xDF, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # \r
          data: [0xDF, 0xFF, 0xDB, 0xDB]
      - delay: 8ms
      - uart.write:       # \n
          data: [0xFB, 0xFB, 0xDB, 0xDB]

  - platform: template
    name: "${friendly_name} Latte Macchiato machen"
    icon: "mdi:coffee-outline"
    id: btn_latte
    on_press:
      - logger.log: "Jura → Latte Macchiato"
      - uart.write:       # F
          data: [0xFB, 0xDF, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # A
          data: [0xDF, 0xDB, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # :
          data: [0xFB, 0xFB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 0
          data: [0xDB, 0xDB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 7
          data: [0xFF, 0xDF, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # \r
          data: [0xDF, 0xFF, 0xDB, 0xDB]
      - delay: 8ms
      - uart.write:       # \n
          data: [0xFB, 0xFB, 0xDB, 0xDB]

  - platform: template
    name: "${friendly_name} Heisswasser"
    icon: "mdi:cup-water"
    id: btn_hot_water
    on_press:
      - logger.log: "Jura → Heisswasser"
      - uart.write:       # F
          data: [0xFB, 0xDF, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # A
          data: [0xDF, 0xDB, 0xDB, 0xDF]
      - delay: 8ms
      - uart.write:       # :
          data: [0xFB, 0xFB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 0
          data: [0xDB, 0xDB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # 8
          data: [0xDB, 0xFB, 0xFF, 0xDB]
      - delay: 8ms
      - uart.write:       # \r
          data: [0xDF, 0xFF, 0xDB, 0xDB]
      - delay: 8ms
      - uart.write:       # \n
          data: [0xFB, 0xFB, 0xDB, 0xDB]

  # --- Maschinen-Steuerung ---
  - platform: template
    name: "${friendly_name} Spuelen"
    icon: "mdi:water-sync"
    id: btn_rinse
    on_press:
      - logger.log: "Jura → Spuelen (AN:02 = Standby, dann AN:01 = Ein)"
      # AN:02 — Standby (löst Spülung beim Wiedereinschalten aus)
      - uart.write: [0xDF, 0xDB, 0xDB, 0xDF]  # A
      - delay: 8ms
      - uart.write: [0xFB, 0xFF, 0xDB, 0xDF]  # N
      - delay: 8ms
      - uart.write: [0xFB, 0xFB, 0xFF, 0xDB]  # :
      - delay: 8ms
      - uart.write: [0xDB, 0xDB, 0xFF, 0xDB]  # 0
      - delay: 8ms
      - uart.write: [0xFB, 0xDB, 0xFF, 0xDB]  # 2
      - delay: 8ms
      - uart.write: [0xDF, 0xFF, 0xDB, 0xDB]  # \r
      - delay: 8ms
      - uart.write: [0xFB, 0xFB, 0xDB, 0xDB]  # \n
      - delay: 3000ms
      # AN:01 — Einschalten (Maschine spült automatisch)
      - uart.write: [0xDF, 0xDB, 0xDB, 0xDF]  # A
      - delay: 8ms
      - uart.write: [0xFB, 0xFF, 0xDB, 0xDF]  # N
      - delay: 8ms
      - uart.write: [0xFB, 0xFB, 0xFF, 0xDB]  # :
      - delay: 8ms
      - uart.write: [0xDB, 0xDB, 0xFF, 0xDB]  # 0
      - delay: 8ms
      - uart.write: [0xDF, 0xDB, 0xFF, 0xDB]  # 1
      - delay: 8ms
      - uart.write: [0xDF, 0xFF, 0xDB, 0xDB]  # \r
      - delay: 8ms
      - uart.write: [0xFB, 0xFB, 0xDB, 0xDB]  # \n

  - platform: restart
    name: "${friendly_name} ESP Restart"

# =============================================================
# Maschine Ein/Aus
# =============================================================
switch:
  - platform: template
    name: "${friendly_name} Maschine"
    icon: "mdi:coffee-maker"
    id: sw_machine
    optimistic: true
    assumed_state: true
    turn_on_action:
      - logger.log: "Jura → Einschalten (AN:01)"
      - uart.write: [0xDF, 0xDB, 0xDB, 0xDF]  # A
      - delay: 8ms
      - uart.write: [0xFB, 0xFF, 0xDB, 0xDF]  # N
      - delay: 8ms
      - uart.write: [0xFB, 0xFB, 0xFF, 0xDB]  # :
      - delay: 8ms
      - uart.write: [0xDB, 0xDB, 0xFF, 0xDB]  # 0
      - delay: 8ms
      - uart.write: [0xDF, 0xDB, 0xFF, 0xDB]  # 1
      - delay: 8ms
      - uart.write: [0xDF, 0xFF, 0xDB, 0xDB]  # \r
      - delay: 8ms
      - uart.write: [0xFB, 0xFB, 0xDB, 0xDB]  # \n
    turn_off_action:
      - logger.log: "Jura → Ausschalten (AN:02)"
      - uart.write: [0xDF, 0xDB, 0xDB, 0xDF]  # A
      - delay: 8ms
      - uart.write: [0xFB, 0xFF, 0xDB, 0xDF]  # N
      - delay: 8ms
      - uart.write: [0xFB, 0xFB, 0xFF, 0xDB]  # :
      - delay: 8ms
      - uart.write: [0xDB, 0xDB, 0xFF, 0xDB]  # 0
      - delay: 8ms
      - uart.write: [0xFB, 0xDB, 0xFF, 0xDB]  # 2
      - delay: 8ms
      - uart.write: [0xDF, 0xFF, 0xDB, 0xDB]  # \r
      - delay: 8ms
      - uart.write: [0xFB, 0xFB, 0xDB, 0xDB]  # \n

# =============================================================
# Diagnose-Sensoren
# =============================================================
sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP"
